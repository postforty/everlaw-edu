name: edu_client
description: "EverLaw Edu: 최신 법령 DB 기반 교육 콘텐츠 자율 생산 및 컴플라이언스 관리 클라이언트"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Cupertino Icons
  cupertino_icons: ^1.0.6

  # State Management (Riverpod 2.x)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Network & Security
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1

  # Markdown Renderer
  flutter_markdown: ^0.6.18+2
  shared_preferences: ^2.5.5
  lottie: ^3.3.3
  uuid: ^4.3.3
  intl: ^0.19.0
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^7.1.1
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  mockito: ^5.4.6
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/transparent.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#FFFFFF"
